<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Órdenes - MiaStore Admin</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        console.log("✅ React cargado correctamente");

        // Verificar autenticación al cargar
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');

            console.log("🔐 Verificando autenticación...");
            console.log("Token presente:", !!token);
            console.log("Rol:", role);

            if (!token || role !== 'ROLE_ADMIN') {
                console.log("❌ No autenticado o no es admin, redirigiendo a login...");
                window.location.href = '/admin/admin-login.html';
            }
        });

        // Iconos SVG
        const ClockIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const PackageIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
        );

        const TruckIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
        );

        const CheckCircleIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        function AdminOrderManager() {
            const [orders, setOrders] = useState([]);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [filterStatus, setFilterStatus] = useState('Todos');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const estadosDisponibles = [
                { 
                    value: 'Pendiente', 
                    label: 'Pendiente', 
                    color: 'bg-yellow-100 text-yellow-800 border-yellow-300',
                    icon: ClockIcon 
                },
                { 
                    value: 'En Preparación', 
                    label: 'En Preparación', 
                    color: 'bg-blue-100 text-blue-800 border-blue-300',
                    icon: PackageIcon 
                },
                { 
                    value: 'En Despacho', 
                    label: 'En Despacho', 
                    color: 'bg-purple-100 text-purple-800 border-purple-300',
                    icon: TruckIcon 
                },
                { 
                    value: 'Entregado', 
                    label: 'Entregado', 
                    color: 'bg-green-100 text-green-800 border-green-300',
                    icon: CheckCircleIcon 
                }
            ];

            // Mapear estados del backend al frontend
            const mapBackendStatusToFrontend = (status) => {
                console.log("🔄 Mapeando estado del backend:", status);
                const statusMap = {
                    'PENDING': 'Pendiente',
                    'PREPARING': 'En Preparación',
                    'SHIPPED': 'En Despacho',
                    'DELIVERED': 'Entregado',
                    'CANCELLED': 'Cancelado'
                };
                return statusMap[status] || status;
            };

            // Cargar órdenes desde el backend
            useEffect(() => {
                fetchOrders();
            }, []);

            const fetchOrders = async () => {
                console.log("🔍 Iniciando carga de órdenes...");
                console.log("🔍 URL:", window.location.origin + '/api/orders/all');
                
                try {
                    setLoading(true);
                    setError(null);
                    
                    // Obtener token de localStorage
                    const token = localStorage.getItem('token');
                    console.log("🔑 Token:", token ? 'Presente' : 'No encontrado');
                    
                    if (!token) {
                        throw new Error('No hay token de autenticación. Redirigiendo a login...');
                    }
                    
                    const response = await fetch('/api/orders/all', {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    console.log("📡 Respuesta recibida:", response.status, response.statusText);
                    
                    // Si es 401, el token expiró
                    if (response.status === 401) {
                        console.log("❌ Token expirado, redirigiendo a login...");
                        localStorage.removeItem('token');
                        localStorage.removeItem('username');
                        localStorage.removeItem('role');
                        window.location.href = '/admin/admin-login.html';
                        return;
                    }
                    
                    if (!response.ok) {
                        const errorText = await response.text();
                        console.error("❌ Error del servidor:", errorText);
                        throw new Error(`Error ${response.status}: ${errorText}`);
                    }
                    
                    const data = await response.json();
                    console.log("📦 Datos recibidos del backend:", data);
                    console.log("📊 Número de órdenes:", data.length);
                    
                    if (data.length > 0) {
                        console.log("📋 Primera orden (ejemplo):", data[0]);
                    }
                    
                    // Transformar los datos del backend al formato del frontend
                    const ordersTransformed = data.map(order => {
                        console.log("🔄 Transformando orden:", order.id, order.orderNumber);
                        
                        return {
                            id: order.orderNumber,
                            idBackend: order.id,
                            cliente: order.user.username + ' (' + (order.user.email || 'sin email') + ')',
                            telefono: order.phone || 'No especificado',
                            direccion: order.shippingAddress || 'No especificada',
                            estado: mapBackendStatusToFrontend(order.status),
                            total: order.total || 0,
                            fecha: new Date(order.createdAt).toLocaleString('es-CO', {
                                day: 'numeric',
                                month: 'short',
                                year: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit'
                            }),
                            productos: order.items ? order.items.map(item => ({
                                nombre: item.product ? item.product.name : 'Producto desconocido',
                                cantidad: item.quantity || 0,
                                precio: item.price || 0
                            })) : []
                        };
                    });
                    
                    console.log("✅ Órdenes transformadas:", ordersTransformed);
                    setOrders(ordersTransformed);
                    
                } catch (error) {
                    console.error('❌ Error completo:', error);
                    setError(error.message);
                    
                    // Si el error es de autenticación, redirigir
                    if (error.message.includes('token') || error.message.includes('autenticación')) {
                        setTimeout(() => {
                            window.location.href = '/admin/admin-login.html';
                        }, 2000);
                    }
                } finally {
                    setLoading(false);
                }
            };

            const cambiarEstado = async (orderId, nuevoEstado) => {
                console.log("🔄 Cambiando estado de orden:", orderId, "a", nuevoEstado);
                
                try {
                    // Obtener token
                    const token = localStorage.getItem('token');
                    if (!token) {
                        alert('❌ Sesión expirada. Redirigiendo a login...');
                        window.location.href = '/admin/admin-login.html';
                        return;
                    }
                    
                    // Encontrar la orden para obtener el ID del backend
                    const order = orders.find(o => o.id === orderId);
                    if (!order) {
                        alert('❌ Orden no encontrada');
                        return;
                    }
                    
                    console.log("📤 Enviando request a:", `/api/orders/${order.idBackend}/status`);
                    
                    const response = await fetch(`/api/orders/${order.idBackend}/status`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ estado: nuevoEstado })
                    });

                    console.log("📡 Respuesta:", response.status);
                    
                    // Si es 401, el token expiró
                    if (response.status === 401) {
                        alert('❌ Sesión expirada. Redirigiendo a login...');
                        localStorage.removeItem('token');
                        localStorage.removeItem('username');
                        localStorage.removeItem('role');
                        window.location.href = '/admin/admin-login.html';
                        return;
                    }

                    if (response.ok) {
                        // Actualizar localmente
                        setOrders(orders.map(o => 
                            o.id === orderId ? { ...o, estado: nuevoEstado } : o
                        ));
                        alert(`✅ Estado actualizado a: ${nuevoEstado}`);
                        console.log("✅ Estado actualizado exitosamente");
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        console.error("❌ Error del servidor:", errorData);
                        alert('❌ Error: ' + (errorData.message || 'No se pudo actualizar el estado'));
                    }
                } catch (error) {
                    console.error('❌ Error al cambiar estado:', error);
                    alert('❌ Error de conexión al actualizar el estado');
                }
            };

            const getEstadoColor = (estado) => {
                const estadoConfig = estadosDisponibles.find(e => e.value === estado);
                return estadoConfig ? estadoConfig.color : 'bg-gray-100 text-gray-800';
            };

            const getEstadoIcon = (estado) => {
                const estadoConfig = estadosDisponibles.find(e => e.value === estado);
                return estadoConfig ? estadoConfig.icon : ClockIcon;
            };

            const ordenesFiltradas = filterStatus === 'Todos' 
                ? orders 
                : orders.filter(order => order.estado === filterStatus);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-16 w-16 border-b-4 border-purple-900 mx-auto mb-4"></div>
                            <p className="text-slate-600 text-lg">Cargando órdenes...</p>
                            <p className="text-slate-500 text-sm mt-2">Revisa la consola (F12) si tarda mucho</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100">
                        <div className="bg-white rounded-2xl shadow-lg p-8 max-w-md">
                            <div className="text-red-600 text-6xl mb-4 text-center">⚠️</div>
                            <h2 className="text-2xl font-bold text-slate-900 mb-4 text-center">Error al cargar</h2>
                            <p className="text-slate-600 mb-4">{error}</p>
                            <button 
                                onClick={fetchOrders}
                                className="w-full bg-purple-900 text-white py-3 rounded-xl font-semibold hover:bg-purple-800 transition-colors"
                            >
                                Reintentar
                            </button>
                            <div className="mt-4 p-4 bg-slate-100 rounded-lg">
                                <p className="text-sm text-slate-700 font-semibold mb-2">Posibles causas:</p>
                                <ul className="text-sm text-slate-600 space-y-1">
                                    <li>• No estás autenticado como ADMIN</li>
                                    <li>• El backend no está corriendo</li>
                                    <li>• Problema de CORS o permisos</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-50 via-slate-100 to-stone-100">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-slate-900 via-purple-900 to-slate-900 text-white shadow-2xl">
                        <div className="max-w-7xl mx-auto px-6 py-8">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg">
                                        <PackageIcon />
                                    </div>
                                    <div>
                                        <h1 className="text-3xl font-bold tracking-tight">Panel de Administración</h1>
                                        <p className="text-purple-200 mt-1">Gestión de Órdenes - MiaStore</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <button 
                                        onClick={fetchOrders}
                                        className="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg transition-colors flex items-center gap-2"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                        </svg>
                                        Actualizar
                                    </button>
                                    <button 
                                        onClick={() => {
                                            localStorage.removeItem('token');
                                            localStorage.removeItem('username');
                                            localStorage.removeItem('role');
                                            window.location.href = '/admin/admin-login.html';
                                        }}
                                        className="bg-red-500/80 hover:bg-red-600 px-4 py-2 rounded-lg transition-colors flex items-center gap-2"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                        </svg>
                                        Cerrar Sesión
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-6 py-8">
                        {/* Filtros */}
                        <div className="bg-white rounded-2xl shadow-lg p-6 mb-8 border border-slate-200">
                            <h2 className="text-lg font-semibold text-slate-800 mb-4">Filtrar Órdenes</h2>
                            <div className="flex flex-wrap gap-3">
                                <button
                                    onClick={() => setFilterStatus('Todos')}
                                    className={`px-5 py-2.5 rounded-xl font-medium transition-all duration-200 ${
                                        filterStatus === 'Todos'
                                            ? 'bg-slate-900 text-white shadow-lg transform scale-105'
                                            : 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                                    }`}
                                >
                                    Todos ({orders.length})
                                </button>
                                {estadosDisponibles.map((estado) => {
                                    const Icon = estado.icon;
                                    const count = orders.filter(o => o.estado === estado.value).length;
                                    return (
                                        <button
                                            key={estado.value}
                                            onClick={() => setFilterStatus(estado.value)}
                                            className={`px-5 py-2.5 rounded-xl font-medium transition-all duration-200 flex items-center gap-2 ${
                                                filterStatus === estado.value
                                                    ? estado.color + ' shadow-lg transform scale-105 border-2'
                                                    : 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                                            }`}
                                        >
                                            <Icon />
                                            {estado.label} ({count})
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Lista de Órdenes */}
                        <div className="space-y-4">
                            {ordenesFiltradas.map((order) => {
                                const EstadoIcon = getEstadoIcon(order.estado);
                                
                                return (
                                    <div
                                        key={order.id}
                                        className="bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden border border-slate-200"
                                    >
                                        <div className="p-6">
                                            <div className="flex flex-wrap items-start justify-between gap-4 mb-4">
                                                <div className="flex-1 min-w-[200px]">
                                                    <div className="flex items-center gap-3 mb-2">
                                                        <h3 className="text-xl font-bold text-slate-900">{order.id}</h3>
                                                        <span className={`px-4 py-1.5 rounded-full text-sm font-semibold border-2 flex items-center gap-2 ${getEstadoColor(order.estado)}`}>
                                                            <EstadoIcon />
                                                            {order.estado}
                                                        </span>
                                                    </div>
                                                    <p className="text-slate-600 font-medium">{order.cliente}</p>
                                                    <p className="text-slate-500 text-sm mt-1">📞 {order.telefono}</p>
                                                    <p className="text-slate-500 text-sm">📍 {order.direccion}</p>
                                                </div>
                                                
                                                <div className="text-right">
                                                    <div className="text-3xl font-bold text-emerald-600">
                                                        ${order.total.toLocaleString('es-CO', { minimumFractionDigits: 2 })}
                                                    </div>
                                                    <div className="text-sm text-slate-500 mt-1">{order.fecha}</div>
                                                </div>
                                            </div>

                                            {/* Productos */}
                                            <div className="bg-slate-50 rounded-xl p-4 mb-4 border border-slate-200">
                                                <h4 className="font-semibold text-slate-700 mb-2">Productos:</h4>
                                                {order.productos.map((producto, idx) => (
                                                    <div key={idx} className="text-slate-600 text-sm">
                                                        <span className="font-medium">{producto.nombre}</span> - 
                                                        Cantidad: {producto.cantidad} - 
                                                        Precio: ${producto.precio.toLocaleString('es-CO')}
                                                    </div>
                                                ))}
                                            </div>

                                            {/* Botones de Cambio de Estado */}
                                            <div>
                                                <p className="text-sm font-semibold text-slate-700 mb-3">Cambiar Estado:</p>
                                                <div className="flex flex-wrap gap-2">
                                                    {estadosDisponibles.map((estado) => {
                                                        const Icon = estado.icon;
                                                        const isCurrentState = order.estado === estado.value;
                                                        
                                                        return (
                                                            <button
                                                                key={estado.value}
                                                                onClick={() => cambiarEstado(order.id, estado.value)}
                                                                disabled={isCurrentState}
                                                                className={`px-4 py-2.5 rounded-xl font-medium transition-all duration-200 flex items-center gap-2 border-2 ${
                                                                    isCurrentState
                                                                        ? estado.color + ' cursor-not-allowed opacity-60'
                                                                        : 'bg-white hover:bg-slate-50 text-slate-700 border-slate-300 hover:border-slate-400 hover:shadow-md'
                                                                }`}
                                                            >
                                                                <Icon />
                                                                {estado.label}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}

                            {ordenesFiltradas.length === 0 && (
                                <div className="bg-white rounded-2xl shadow-md p-12 text-center border border-slate-200">
                                    <PackageIcon />
                                    <p className="text-slate-500 text-lg mt-4">No hay órdenes con el estado: <strong>{filterStatus}</strong></p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Footer */}
                    <footer className="bg-slate-900 text-slate-400 mt-16 py-6">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <p>© 2026 MiaStore-Bogotá. Todos los derechos reservados.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // Renderizar la aplicación
        console.log("🎨 Renderizando aplicación...");
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminOrderManager />);
        console.log("✅ Aplicación renderizada");
    </script>
</body>
</html>
