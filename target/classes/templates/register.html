<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Tienda de Ropa</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1><a href="/index.html">👕 Fashion Store</a></h1>
            </div>
            <ul class="nav-menu">
                <li><a href="/index.html">Inicio</a></li>
                <li><a href="/products.html">Productos</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Crear Cuenta</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="username" required minlength="3">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="fullName">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="phone">
                </div>
                <div class="form-group">
                    <label>Dirección</label>
                    <textarea id="address" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
                <div id="message" class="message"></div>
            </form>
            <p class="text-center">¿Ya tienes cuenta? <a href="/login.html">Inicia sesión aquí</a></p>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showMessage('Registro exitoso. Redirigiendo al login...', 'success');
                    setTimeout(() => window.location.href = '/login.html', 2000);
                } else {
                    const error = await response.text();
                    showMessage(error, 'error');
                }
            } catch (error) {
                showMessage('Error en el servidor', 'error');
            }
        });
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
        }
    </script>
</body>
</html>
