# Server Configuration - Obligatorio para el puerto dinámico de Render
server.port=${PORT:8080}
server.error.include-message=always
spring.application.name=Online Clothing Store

# Database Configuration - Conexión Dinámica para Render y Aiven
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# File Upload Configuration (Ajustado para el entorno Linux de Render)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB
file.upload-dir=/app/uploads

# JWT Configuration
jwt.secret=miClaveSecretaSuperSeguraParaJWT2024DebeSerMuyLargaYComplejaMasDe256Bits
jwt.expiration=86400000

# Logging
logging.level.com.tiendaropa=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false

# CORS Configuration (Ajustado para permitir tanto pruebas locales como producción)
spring.web.cors.allowed-origins=http://localhost:8080,http://127.0.0.1:8080,https://miastore.onrender.com
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true