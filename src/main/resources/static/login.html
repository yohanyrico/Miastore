<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tienda de Ropa</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1><a href="/index.html">👕 MiaStore</a></h1>
            </div>
            <ul class="nav-menu">
                <li><a href="/index.html">Inicio</a></li>
                <li><a href="/products.html">Productos</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Iniciar Sesión</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
                <div id="message" class="message"></div>
            </form>
            <p class="text-center">¿No tienes cuenta? <a href="/register.html">Regístrate aquí</a></p>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Guardar datos en localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('userRole', data.role); // ⭐ IMPORTANTE: Guardar rol
                    localStorage.setItem('roles', JSON.stringify(data.roles));
                    
                    showMessage('Login exitoso', 'success');
                    
                    // Redirigir según el rol
                    setTimeout(() => {
                        if (data.role === 'ROLE_ADMIN' || data.role === 'ADMIN') {
                            window.location.href = '/products.html'; // Admin también va a productos
                        } else {
                            window.location.href = '/products.html';
                        }
                    }, 1000);
                } else {
                    showMessage('Credenciales inválidas', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error en el servidor', 'error');
            }
        });
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
        }
    </script>
</body>
</html>
