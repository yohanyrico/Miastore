<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Tienda de Ropa</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 2rem;
        }

        .header-section h1 {
            margin: 0;
        }

        .upload-section {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        /* Estilos para botones de admin en las tarjetas */
        .admin-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-edit {
            background: #ff9c07;
            color: #000;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
        }

        .btn-edit:hover {
            background: #e0a800;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        /* Modal para editar */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 2rem;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #000;
        }

        @media (max-width: 768px) {
            .header-section {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1><a href="/index.html">👕 MiaStore</a></h1>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="/index.html">Inicio</a></li>
                <li><a href="/products.html" class="active">Productos</a></li>
                <li><a href="/cart.html">Carrito <span id="cartCount">0</span></a></li>
                <li id="authLinks"></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="padding: 2rem 0;">
        <div class="header-section">
            <h1>Nuestros Productos</h1>
            <button id="createProductBtn" onclick="toggleProductForm()" class="btn btn-primary" style="display: none;">+ Crear Producto</button>
        </div>

        <!-- Formulario crear producto -->
        <div id="productFormSection" class="upload-section" style="display: none;">
            <h2>Crear Nuevo Producto</h2>
            <form id="createProductForm" enctype="multipart/form-data">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="productName">Nombre del Producto *</label>
                        <input type="text" id="productName" name="name" required placeholder="Ej: Camiseta Básica Blanca">
                    </div>

                    <div class="form-group">
                        <label for="productPrice">Precio ($) *</label>
                        <input type="number" id="productPrice" name="price" step="100" min="0" max="10000000" required placeholder="Ej: 49900">
                    </div>

                    <div class="form-group">
                        <label for="productStock">Stock *</label>
                        <input type="number" id="productStock" name="stock" min="0" required placeholder="50">
                    </div>

                    <div class="form-group">
                        <label for="productCategory">Categoría *</label>
                        <select id="productCategory" name="category" required>
                            <option value="">Seleccionar...</option>
                            <option value="Camisetas">Camisetas</option>
                            <option value="Pantalones">Pantalones</option>
                            <option value="Vestidos">Vestidos</option>
                            <option value="Zapatos">Zapatos</option>
                            <option value="Accesorios">Accesorios</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="productDescription">Descripción</label>
                    <textarea id="productDescription" name="description" rows="3" placeholder="Descripción del producto..."></textarea>
                </div>

                <div class="form-group">
                    <label for="productImage">Imagen del Producto *</label>
                    <input type="file" id="productImage" name="image" accept="image/*" required>
                </div>

                <img id="imagePreview" src="" alt="Vista previa" style="max-width: 200px; display: none; margin: 1rem 0; border-radius: 5px;">

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary">Crear Producto</button>
                    <button type="button" onclick="toggleProductForm()" class="btn btn-secondary">Cancelar</button>
                </div>
            </form>
        </div>

        <!-- Contenedor de productos -->
        <div id="productsContainer" class="product-grid"></div>
    </div>

    <!-- Modal para editar producto -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeEditModal()">&times;</span>
            <h2>Editar Producto</h2>
            <form id="editProductForm" enctype="multipart/form-data">
                <input type="hidden" id="editProductId">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editProductName">Nombre *</label>
                        <input type="text" id="editProductName" required>
                    </div>

                    <div class="form-group">
                        <label for="editProductPrice">Precio ($) *</label>
                        <input type="number" id="editProductPrice" step="100" min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="editProductStock">Stock *</label>
                        <input type="number" id="editProductStock" min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="editProductCategory">Categoría *</label>
                        <select id="editProductCategory" required>
                            <option value="">Seleccionar...</option>
                            <option value="Camisetas">Camisetas</option>
                            <option value="Pantalones">Pantalones</option>
                            <option value="Vestidos">Vestidos</option>
                            <option value="Zapatos">Zapatos</option>
                            <option value="Accesorios">Accesorios</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="editProductDescription">Descripción</label>
                    <textarea id="editProductDescription" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="editProductImage">Nueva Imagen (opcional)</label>
                    <input type="file" id="editProductImage" accept="image/*">
                </div>

                <img id="editImagePreview" src="" alt="Vista previa" style="max-width: 200px; margin: 1rem 0; border-radius: 5px;">

                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    <button type="button" onclick="closeEditModal()" class="btn btn-secondary">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 MiaStore-Bogotá. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        let allProducts = [];

        document.addEventListener('DOMContentLoaded', () => {
            updateNavigation();
            updateCartCount();
            loadProducts();
            checkAdminAccess();

            document.getElementById('productImage').addEventListener('change', previewImage);
            document.getElementById('editProductImage').addEventListener('change', previewEditImage);
            document.getElementById('createProductForm').addEventListener('submit', createProduct);
            document.getElementById('editProductForm').addEventListener('submit', updateProduct);
        });

        function checkAdminAccess() {
            const createBtn = document.getElementById('createProductBtn');
            
            if (isAdmin()) {
                createBtn.style.display = 'inline-block';
            } else {
                createBtn.style.display = 'none';
            }
        }

        function toggleProductForm() {
            const formSection = document.getElementById('productFormSection');
            formSection.style.display = formSection.style.display === 'none' ? 'block' : 'none';
        }

        function previewImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        function previewEditImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    const preview = document.getElementById('editImagePreview');
                    preview.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        async function createProduct(e) {
            e.preventDefault();

            const fileInput = document.getElementById('productImage');

            if (!fileInput.files[0]) {
                alert('Por favor selecciona una imagen');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('name', document.getElementById('productName').value);
                formData.append('price', document.getElementById('productPrice').value);
                formData.append('description', document.getElementById('productDescription').value || '');
                formData.append('category', document.getElementById('productCategory').value);
                formData.append('stock', document.getElementById('productStock').value);
                formData.append('image', fileInput.files[0]);

                const response = await fetchWithAuth('/api/admin/products', {
                    method: 'POST',
                    body: formData
                });

                if (!response || !response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Error: ${errorText}`);
                }

                const newProduct = await response.json();
                console.log('Producto creado:', newProduct);

                document.getElementById('createProductForm').reset();
                document.getElementById('imagePreview').style.display = 'none';
                toggleProductForm();

                alert('¡Producto creado exitosamente!');
                loadProducts();

            } catch (error) {
                console.error('Error completo:', error);
                alert('Error al crear el producto: ' + error.message);
            }
        }

        function openEditModal(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) {
                alert('Producto no encontrado');
                return;
            }

            document.getElementById('editProductId').value = product.id;
            document.getElementById('editProductName').value = product.name;
            document.getElementById('editProductPrice').value = product.price;
            document.getElementById('editProductStock').value = product.stock;
            document.getElementById('editProductCategory').value = product.category;
            document.getElementById('editProductDescription').value = product.description || '';

            const imageUrl = product.imageUrl
                ? `http://localhost:8080/uploads/${product.imageUrl}`
                : '/uploads/default.jpg';
            document.getElementById('editImagePreview').src = imageUrl;

            document.getElementById('editModal').style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            document.getElementById('editProductForm').reset();
        }

        async function updateProduct(e) {
            e.preventDefault();

            const productId = document.getElementById('editProductId').value;

            try {
                const formData = new FormData();
                formData.append('name', document.getElementById('editProductName').value);
                formData.append('price', document.getElementById('editProductPrice').value);
                formData.append('description', document.getElementById('editProductDescription').value || '');
                formData.append('category', document.getElementById('editProductCategory').value);
                formData.append('stock', document.getElementById('editProductStock').value);

                const imageFile = document.getElementById('editProductImage').files[0];
                if (imageFile) {
                    formData.append('image', imageFile);
                }

                const response = await fetchWithAuth(`/api/admin/products/${productId}`, {
                    method: 'PUT',
                    body: formData
                });

                if (!response || !response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Error: ${errorText}`);
                }

                alert('¡Producto actualizado exitosamente!');
                closeEditModal();
                loadProducts();

            } catch (error) {
                console.error('Error:', error);
                alert('Error al actualizar el producto: ' + error.message);
            }
        }

        async function deleteProduct(productId) {
            if (!confirm('¿Estás seguro de que deseas eliminar este producto?')) {
                return;
            }

            try {
                const response = await fetchWithAuth(`/api/admin/products/${productId}`, {
                    method: 'DELETE'
                });

                if (!response || !response.ok) {
                    throw new Error('Error al eliminar el producto');
                }

                alert('Producto eliminado exitosamente');
                loadProducts();

            } catch (error) {
                console.error('Error:', error);
                alert('Error al eliminar el producto');
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                if (!response.ok) {
                    throw new Error('Error al cargar productos');
                }

                const products = await response.json();
                allProducts = products;

                const container = document.getElementById('productsContainer');
                container.innerHTML = '';

                if (products.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #666;">No hay productos disponibles.</p>';
                    return;
                }

                products.forEach(product => {
                    addProductCard(product);
                });
            } catch (error) {
                console.error('Error al cargar productos:', error);
                document.getElementById('productsContainer').innerHTML =
                    '<p style="text-align: center; color: red;">Error al cargar productos.</p>';
            }
        }

        function addProductCard(product) {
            const container = document.getElementById('productsContainer');
            const productCard = document.createElement('div');
            productCard.className = 'product-card';

            const imageUrl = product.imageUrl
                ? `http://localhost:8080/uploads/${product.imageUrl}`
                : '/uploads/default.jpg';

            // Botones de admin (solo visibles si es admin)
            const adminButtons = isAdmin() ? `
                <div class="admin-actions">
                    <button onclick="openEditModal(${product.id})" class="btn-edit">Editar</button>
                    <button onclick="deleteProduct(${product.id})" class="btn-delete">Eliminar</button>
                </div>
            ` : '';

            productCard.innerHTML = `
                <img src="${imageUrl}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/300'">
                <h3>${product.name}</h3>
                <p>${product.description || ''}</p>
                <p class="price">$${product.price.toFixed(2)}</p>
                <p>Stock: ${product.stock}</p>
                <p style="color: #666; font-size: 0.9rem;">Categoría: ${product.category}</p>
                ${product.stock > 0 ?
                    `<button onclick="addToCart(${product.id})" class="btn btn-primary">Agregar al Carrito</button>` :
                    `<button class="btn btn-disabled" disabled>Agotado</button>`
                }
                ${adminButtons}
            `;
            container.appendChild(productCard);
        }

        // Cerrar modal al hacer clic fuera
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target == modal) {
                closeEditModal();
            }
        }
    </script>
</body>

</html>
